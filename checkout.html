<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout - PLUGWEAR</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="checkout-box">

  <h1>Checkout</h1>

  <input type="text" id="name" placeholder="Full Name">
  <input type="text" id="address" placeholder="Address">
  <input type="text" id="city" placeholder="City">

  <h3>Payment Method</h3>

  <select id="paymentMethod">
    <option value="cod">Cash on Delivery</option>
    <option value="crypto">Crypto (USDT/BTC)</option>
  </select>

  <div id="cryptoInfo">

    <h3>💳 Crypto Payment</h3>

    <p><b>USDT (TRC20)</b></p>
    <p id="wallet">YOUR-USDT-WALLET</p>

    <img
    src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=YOUR-USDT-WALLET"
    width="200">

    <h4>Upload Payment Screenshot</h4>

    <input type="file" id="paymentProof">

  </div>

  <button onclick="placeOrder()">
    Place Order
  </button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBRy6pd2rzftMLcLUUOTv0P3f9YBdqQvBA",
  authDomain: "plugwear-17ffc.firebaseapp.com",
  projectId: "plugwear-17ffc",
  storageBucket: "plugwear-17ffc.firebasestorage.app",
  messagingSenderId: "42517755726",
  appId: "1:42517755726:web:8ac214acbdb379d766d01f"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

function placeOrder(){

  let name = document.getElementById("name").value;
  let address = document.getElementById("address").value;
  let city = document.getElementById("city").value;

  const file = document.getElementById("paymentProof").files[0];

  if(file){

    const storageRef = firebase.storage().ref();
    const ref = storageRef.child("proofs/" + file.name);

    ref.put(file).then(snapshot => {

      snapshot.ref.getDownloadURL().then(url => {

        saveOrder(url);

      });

    });

  } else {

    saveOrder("");

  }

  function saveOrder(proofUrl){

    db.collection("orders").add({

      name: name,
      address: address,
      city: city,

      payment: document.getElementById("paymentMethod").value,

      proof: proofUrl,

      status: "pending",

      price: 20,

      time: Date.now()

    });

    alert("Order placed 🔥");

  }

}
</script>

</body>
</html>
