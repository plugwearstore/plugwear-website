<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout - PLUGWEAR</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="checkout-box">

  <h1>Checkout</h1>

  <input type="text" placeholder="Full Name">
  <input type="text" placeholder="Address">
  <input type="text" placeholder="City">

  <h3>Payment Method</h3>

  <select id="paymentMethod">
    <option value="cod">Cash on Delivery</option>
    <option value="crypto">Crypto (USDT / BTC)</option>
  </select>

  <button onclick="placeOrder()">Place Order</button>

<div id="cryptoInfo">

  <h3>💳 Crypto Payment</h3>

  <p><b>USDT (TRC20):</b></p>
  <p id="wallet">
    YOUR-USDT-WALLET
  </p>

  <p><b>BTC:</b></p>
  <p>
    YOUR-BTC-WALLET
  </p>

  <h4>Upload Payment Screenshot</h4>

  <input type="file" id="paymentProof">

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBRy6pd2rzftMLcLUUOTv0P3f9YBdqQvBA",
  authDomain: "plugwear-17ffc.firebaseapp.com",
  projectId: "plugwear-17ffc",
  storageBucket: "plugwear-17ffc.firebasestorage.app",
  messagingSenderId: "42517755726",
  appId: "1:42517755726:web:8ac214acbdb379d766d01f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function placeOrder(){

  let inputs = document.querySelectorAll("input");

  let name = inputs[0].value;
  let address = inputs[1].value;
  let city = inputs[2].value;

  db.collection("orders").add({
    name: name,
    address: address,
    city: city,
    payment: document.getElementById("paymentMethod").value,
    status: "pending",
    time: Date.now()
  });

  alert("Order placed successfully 🔥");
}
</script>

</body>
</html>
<div id="cryptoInfo">
  <p>Send payment to:</p>
  <p>USDT (TRC20): YOUR-WALLET-ADDRESS</p>
  <p>BTC: YOUR-BTC-ADDRESS</p>
</div>
