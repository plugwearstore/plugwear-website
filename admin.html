<!DOCTYPE html>
<html>
<head>
  <title>Admin - PLUGWEAR</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginBox">
  <h2>Admin Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="adminPanel" style="display:none;">

  <!-- PRODUCTS -->
  <div class="dashboard">
    <h2>🛍 Add Product</h2>
    <input id="pName" placeholder="Name">
    <input id="pPrice" type="number" placeholder="Price">
    <input id="pImage" placeholder="Image URL">
    <button onclick="addProduct()">Add</button>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard">
    <h2>📊 Dashboard</h2>
    <p id="totalOrders">0</p>
    <p id="totalRevenue">0€</p>
  </div>

  <h2>🔥 Orders</h2>
  <div id="orders"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBRy6pd2rzftMLcLUUOTv0P3f9YBdqQvBA",
  authDomain:"plugwear-17ffc.firebaseapp.com",
  projectId:"plugwear-17ffc",
  storageBucket:"plugwear-17ffc.firebasestorage.app",
  messagingSenderId:"42517755726",
  appId:"1:42517755726:web:8ac214acbdb379d766d01f"
});

const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN
function login(){
  auth.signInWithEmailAndPassword(
    email.value,
    password.value
  ).then(()=>{
    loginBox.style.display="none";
    adminPanel.style.display="block";
    loadOrders();
  }).catch(e=>alert(e.message));
}

// ADD PRODUCT
function addProduct(){
  db.collection("products").add({
    name:pName.value,
    price:Number(pPrice.value),
    image:pImage.value
  });
  alert("Product added");
}

// ORDERS + REVENUE
function loadOrders(){

  db.collection("orders").onSnapshot(snap=>{

    orders.innerHTML="";

    let count=0;
    let revenue=0;

    snap.forEach(doc=>{
      count++;
      let o=doc.data();
      revenue += o.price || 0;

      orders.innerHTML += `
        <div class="order-card">
          <p>${o.name}</p>
          <p>${o.address}</p>
          <p>${o.payment}</p>
          <p>${o.status}</p>

          <a href="${o.proof}" target="_blank">Proof</a>

          <button onclick="updateStatus('${doc.id}','shipped')">Ship</button>
          <button onclick="updateStatus('${doc.id}','delivered')">Done</button>
        </div>
      `;
    });

    totalOrders.innerText="Orders: "+count;
    totalRevenue.innerText="Revenue: "+revenue+"€";
  });
}

function updateStatus(id,status){
  db.collection("orders").doc(id).update({status});
}
</script>

</body>
</html>
