<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <title>Admin Porositë - PLUGWEAR</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="loginAdmin" class="admin-login">

  <h2>Admin Login</h2>

  <input id="adminEmail" type="text" placeholder="Email">
  <input id="adminPass" type="password" placeholder="Password">

  <button onclick="adminLogin()">Login</button>

</div>
<div class="admin-box">

  <h1>🔥 POROSITË PLUGWEAR</h1>

  <div id="orders"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBRy6pd2rzftMLcLUUOTv0P3f9YBdqQvBA",
  authDomain: "plugwear-17ffc.firebaseapp.com",
  projectId: "plugwear-17ffc",
  storageBucket: "plugwear-17ffc.firebasestorage.app",
  messagingSenderId: "42517755726",
  appId: "1:42517755726:web:8ac214acbdb379d766d01f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function loadOrders(){

  const container = document.getElementById("orders");

  db.collection("orders").onSnapshot(snapshot => {

    container.innerHTML = "";

    snapshot.forEach(doc => {
      const o = doc.data();

      container.innerHTML += `
        <div class="order-card">
          <p><b>Emri:</b> ${o.name || "-"}</p>
          <p><b>Adresa:</b> ${o.address || "-"}</p>
          <p><b>Qyteti:</b> ${o.city || "-"}</p>
          <p><b>Pagesa:</b> ${o.payment || "N/A"}</p>
          <p><b>Koha:</b> ${new Date(o.time).toLocaleString()}</p>
        </div>
      `;
    });

  });
}

loadOrders();
</script>

</body>
</html>
