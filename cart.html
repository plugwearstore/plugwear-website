!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Cart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🛒 Your Cart</h1>

<div id="cartItems"></div>

<button onclick="goCheckout()">Checkout</button>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBRy6pd2rzftMLcLUUOTv0P3f9YBdqQvBA",
  authDomain: "plugwear-17ffc.firebaseapp.com",
  projectId: "plugwear-17ffc",
  storageBucket: "plugwear-17ffc.firebasestorage.app",
  messagingSenderId: "42517755726",
  appId: "1:42517755726:web:8ac214acbdb379d766d01f"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(user => {

  if(!user){
    document.body.innerHTML = "<h2>Duhet login 🔐</h2>";
    return;
  }

  const container = document.getElementById("cartItems");

  db.collection("carts")
    .where("userId", "==", user.uid)
    .onSnapshot(snapshot => {

      container.innerHTML = "";

      let total = 0;

snapshot.forEach(doc => {

  let c = doc.data();

  total += c.price || 0;

  container.innerHTML += `
    <div class="order-card">
      <p>🛍 ${c.product}</p>
      <p>💰 ${c.price}€</p>
    </div>
  `;
});

document.getElementById("totalPrice").innerText = "Total: " + total + "€";
        `;

      });

    });

});

function goCheckout(){
  window.location.href = "checkout.html";
}
</script>

</body>
</html>
